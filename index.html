<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bussavganger - Tromsø</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .controls {
      margin-bottom: 20px;
    }
    select {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #e0e0e0;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: #007acc;
    }
    .departures {
      background: #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }
    .departure {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #3a3a3a;
      gap: 16px;
    }
    .departure:last-child {
      border-bottom: none;
    }
    .line {
      background: #007acc;
      color: white;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      font-size: 18px;
      flex-shrink: 0;
    }
    .info {
      flex: 1;
    }
    .destination {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .time {
      font-size: 14px;
      color: #888;
    }
    .time.now {
      color: #4caf50;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #f44336;
    }
    .update-time {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚌 Bussavganger - Tromsø</h1>
    <div class="controls">
      <select id="stopSelect"></select>
    </div>
    <div id="departures" class="departures">
      <div class="loading">Laster...</div>
    </div>
    <div class="update-time" id="updateTime"></div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
